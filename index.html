<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turbo Lotto Predictor</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      font-family:sans-serif;
      background:#0f172a;
    }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .number-ball{
      width:70px;
      height:70px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      font-weight:bold;
      color:white;
      animation:pop .4s ease;
    }

    @keyframes pop{
      0%{
        transform:scale(.5);
        opacity:0;
      }
      100%{
        transform:scale(1);
        opacity:1;
      }
    }

    .loading{
      animation:pulse 1s infinite;
    }
  </style>
</head>

<body class="text-white min-h-screen p-4">

  <div class="max-w-md mx-auto">

    <div class="glass rounded-3xl p-6 shadow-2xl">

      <h1 class="text-3xl font-bold text-center mb-2">
        🎯 Turbo Lotto AI
      </h1>

      <p class="text-center text-gray-400 text-sm mb-6">
        วิเคราะห์เลขเด่นจากสถิติย้อนหลัง
      </p>

      <div class="flex gap-3 mb-6">

        <button
          id="btn-lao"
          class="flex-1 bg-red-600 py-3 rounded-xl font-bold"
        >
          🇱🇦 หวยลาว
        </button>

        <button
          id="btn-thai"
          class="flex-1 bg-slate-700 py-3 rounded-xl font-bold"
        >
          🇹🇭 หวยไทย
        </button>

      </div>

      <div
        id="numberContainer"
        class="flex justify-center gap-3 flex-wrap min-h-[90px] mb-6"
      ></div>

      <button
        id="predictBtn"
        class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition"
      >
        🚀 วิเคราะห์เลขเด่น
      </button>

      <div class="mt-6">

        <h2 class="font-bold mb-3">
          📊 สถิติย้อนหลัง
        </h2>

        <div
          id="historyContainer"
          class="space-y-2"
        ></div>

      </div>

    </div>

  </div>

<script>

const historyData = {
  lao:[
    {top:"769",bottom:"87"},
    {top:"572",bottom:"95"},
    {top:"417",bottom:"34"},
    {top:"804",bottom:"78"},
    {top:"932",bottom:"12"},
    {top:"118",bottom:"44"}
  ],

  thai:[
    {top:"452",bottom:"95"},
    {top:"729",bottom:"38"},
    {top:"118",bottom:"21"},
    {top:"205",bottom:"64"},
    {top:"887",bottom:"09"},
    {top:"541",bottom:"72"}
  ]
};

let currentMode = "lao";

const predictBtn =
document.getElementById("predictBtn");

const numberContainer =
document.getElementById("numberContainer");

const historyContainer =
document.getElementById("historyContainer");

const laoBtn =
document.getElementById("btn-lao");

const thaiBtn =
document.getElementById("btn-thai");



function renderHistory(){

  historyContainer.innerHTML = "";

  historyData[currentMode].forEach(item=>{

    const row =
    document.createElement("div");

    row.className =
    "glass rounded-xl p-3 flex justify-between";

    const top =
    document.createElement("div");

    top.textContent =
    `3 ตัวบน: ${item.top}`;

    const bottom =
    document.createElement("div");

    bottom.textContent =
    `2 ตัวล่าง: ${item.bottom}`;

    row.appendChild(top);
    row.appendChild(bottom);

    historyContainer.appendChild(row);

  });

}



function getAllDigits(){

  const rows =
  historyData[currentMode];

  const digits = [];

  rows.forEach(r=>{

    const combined =
    r.top + r.bottom;

    combined.split("").forEach(n=>{

      const num =
      parseInt(n);

      if(!isNaN(num)){

        digits.push(num);

      }

    });

  });

  return digits;

}



function calculateHotNumbers(){

  const digits =
  getAllDigits();

  const freq = {};

  for(let i=0;i<=9;i++){

    freq[i]=0;

  }

  digits.forEach(n=>{

    freq[n]++;

  });

  const sorted =
  Object.entries(freq)
  .sort((a,b)=>b[1]-a[1]);

  return sorted;

}



function cryptoRandom(){

  const arr =
  new Uint32Array(1);

  crypto.getRandomValues(arr);

  return arr[0];

}



function generatePrediction(){

  numberContainer.innerHTML = "";

  for(let i=0;i<4;i++){

    const loading =
    document.createElement("div");

    loading.className =
    "number-ball loading bg-slate-700";

    loading.textContent = "⚡";

    numberContainer.appendChild(loading);

  }

  setTimeout(()=>{

    numberContainer.innerHTML = "";

    const hotNumbers =
    calculateHotNumbers();

    const finalNumbers = [];

    for(let i=0;i<4;i++){

      const base =
      parseInt(hotNumbers[i][0]);

      const random =
      cryptoRandom()%3;

      const final =
      (base + random)%10;

      finalNumbers.push(final);

    }

    finalNumbers.forEach(num=>{

      const ball =
      document.createElement("div");

      ball.className =
      currentMode==="lao"
      ? "number-ball bg-gradient-to-br from-red-500 to-orange-500"
      : "number-ball bg-gradient-to-br from-emerald-500 to-cyan-500";

      ball.textContent = num;

      numberContainer.appendChild(ball);

    });

  },1500);

}



function switchMode(mode){

  currentMode = mode;

  if(mode==="lao"){

    laoBtn.className =
    "flex-1 bg-red-600 py-3 rounded-xl font-bold";

    thaiBtn.className =
    "flex-1 bg-slate-700 py-3 rounded-xl font-bold";

  }else{

    thaiBtn.className =
    "flex-1 bg-emerald-600 py-3 rounded-xl font-bold";

    laoBtn.className =
    "flex-1 bg-slate-700 py-3 rounded-xl font-bold";

  }

  renderHistory();

  numberContainer.innerHTML = "";

}



laoBtn.addEventListener("click",()=>{

  switchMode("lao");

});



thaiBtn.addEventListener("click",()=>{

  switchMode("thai");

});



predictBtn.addEventListener("click",()=>{

  generatePrediction();

});



renderHistory();

</script>

</body>
</html>
