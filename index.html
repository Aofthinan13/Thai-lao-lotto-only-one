<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turbo Lotto AI - Pro Version</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #020617;
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .ball {
      width: 70px;
      height: 70px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      color: white;
      animation: pop 0.4s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .loading {
      animation: pulse 1s infinite;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
  </style>
</head>
<body class="text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <div class="glass rounded-3xl p-5 shadow-2xl">
      <h1 class="text-3xl font-bold text-center mb-2">🎯 Turbo Lotto AI</h1>
      <p class="text-center text-emerald-400 text-sm mb-6 font-medium">
        เวอร์ชันอัปเกรด: วิเคราะห์ความน่าจะเป็นแยกตามหลัก
      </p>

      <div class="flex gap-3 mb-6">
        <button id="thaiBtn" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold transition">
          🇹🇭 หวยไทย
        </button>
        <button id="laoBtn" class="flex-1 bg-slate-800 py-3 rounded-xl font-bold transition">
          🇱🇦 หวยลาว
        </button>
      </div>

      <button id="generateBtn" class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 py-4 rounded-2xl font-bold text-lg shadow-lg mb-6 active:scale-95 transition">
        🚀 วิเคราะห์เลขเด่น
      </button>

      <div class="space-y-5">
        <div>
          <h2 class="font-bold mb-3 text-slate-300">รางวัลหลัก</h2>
          <div id="mainContainer" class="flex justify-center gap-2 flex-wrap"></div>
        </div>
        <div>
          <h2 class="font-bold mb-3 text-slate-300">3 ตัวท้าย</h2>
          <div id="threeContainer" class="flex justify-center gap-2 flex-wrap"></div>
        </div>
        <div>
          <h2 class="font-bold mb-3 text-slate-300">2 ตัวท้าย</h2>
          <div id="twoContainer" class="flex justify-center gap-2 flex-wrap"></div>
        </div>
        <div id="thaiBottomSection">
          <h2 class="font-bold mb-3 text-yellow-400">เลขท้าย 2 ตัวล่าง</h2>
          <div id="bottomContainer" class="flex justify-center gap-2 flex-wrap"></div>
        </div>
      </div>

      <div class="mt-8">
        <h2 class="font-bold mb-3 text-slate-300">📊 สถิติย้อนหลัง (ฐานข้อมูล)</h2>
        <div id="historyContainer" class="space-y-3 text-sm"></div>
      </div>
    </div>
  </div>

<script>
let currentMode = 'thai';
let isGenerating = false;

// [อัปเดต]: เพิ่มข้อมูลวันที่ (date) เข้าไปในแต่ละงวด
const historyData = {
  thai: [
    { date: '16 พ.ค. 69', main: '985452', bottom: '95' },
    { date: '2 พ.ค. 69', main: '284729', bottom: '38' },
    { date: '16 เม.ย. 69', main: '543118', bottom: '21' },
    { date: '1 เม.ย. 69', main: '074205', bottom: '64' },
    { date: '16 มี.ค. 69', main: '998887', bottom: '09' },
    { date: '1 มี.ค. 69', main: '125272', bottom: '09' },
    { date: '16 ก.พ. 69', main: '361807', bottom: '92' }
  ],
  lao: [
    { date: '20 พ.ค. 69', main: '8769', bottom: '87' },
    { date: '18 พ.ค. 69', main: '9572', bottom: '95' },
    { date: '15 พ.ค. 69', main: '3417', bottom: '34' },
    { date: '13 พ.ค. 69', main: '7804', bottom: '78' },
    { date: '11 พ.ค. 69', main: '1932', bottom: '12' },
    { date: '8 พ.ค. 69', main: '4451', bottom: '44' }
  ]
};

const thaiBtn = document.getElementById('thaiBtn');
const laoBtn = document.getElementById('laoBtn');
const generateBtn = document.getElementById('generateBtn');
const mainContainer = document.getElementById('mainContainer');
const threeContainer = document.getElementById('threeContainer');
const twoContainer = document.getElementById('twoContainer');
const bottomContainer = document.getElementById('bottomContainer');
const historyContainer = document.getElementById('historyContainer');
const thaiBottomSection = document.getElementById('thaiBottomSection');

// [อัปเดต]: ปรับปรุงการวาด UI ให้แสดงวันที่พร้อมเส้นคั่น
function renderHistory() {
  historyContainer.innerHTML = '';
  historyData[currentMode].forEach(item => {
    const top3 = item.main.slice(-3);
    const div = document.createElement('div');
    
    // เปลี่ยน layout เป็น column เพื่อให้วางวันที่ไว้ด้านบนได้
    div.className = 'glass rounded-xl p-3 flex flex-col gap-2';
    
    if(currentMode === 'thai') {
        div.innerHTML = `
          <div class="flex justify-between items-center border-b border-white/10 pb-2 mb-1">
            <span class="text-xs text-emerald-300 font-semibold bg-emerald-900/40 px-2 py-1 rounded">🗓️ งวดวันที่ ${item.date}</span>
          </div>
          <div class="flex justify-between items-center px-1">
            <div class="text-white font-mono tracking-widest text-base">${item.main}</div>
            <div class="text-gray-400">ล่าง: <span class="text-yellow-400 font-bold text-base">${item.bottom}</span></div>
          </div>
        `;
    } else {
        div.innerHTML = `
          <div class="flex justify-between items-center border-b border-white/10 pb-2 mb-1">
            <span class="text-xs text-red-300 font-semibold bg-red-900/40 px-2 py-1 rounded">🗓️ งวดวันที่ ${item.date}</span>
          </div>
          <div class="flex justify-between items-center px-1">
            <div class="text-white font-mono tracking-widest text-base">${item.main}</div>
            <div class="text-gray-400">3ตัว: <span class="text-white font-bold text-base">${top3}</span></div>
          </div>
        `;
    }
    historyContainer.appendChild(div);
  });
}

function getPositionalFrequency(type, length) {
  const frequencies = Array.from({ length }, () => {
    const freq = {};
    for (let i = 0; i <= 9; i++) freq[i] = 1;
    return freq;
  });

  historyData[currentMode].forEach(item => {
    const targetStr = item[type];
    if (targetStr && targetStr.length === length) {
      for (let i = 0; i < length; i++) {
        const digit = parseInt(targetStr[i]);
        if (!isNaN(digit)) {
          frequencies[i][digit] += 3;
        }
      }
    }
  });
  return frequencies;
}

function weightedRandom(freq) {
  const pool = [];
  Object.entries(freq).forEach(([digit, score]) => {
    for (let i = 0; i < score; i++) {
      pool.push(Number(digit));
    }
  });
  const random = crypto.getRandomValues(new Uint32Array(1))[0];
  return pool[random % pool.length];
}

function generatePositionalNumber(type, length) {
  const posFreqs = getPositionalFrequency(type, length);
  let result = '';
  for (let i = 0; i < length; i++) {
    result += weightedRandom(posFreqs[i]);
  }
  return result;
}

function renderBalls(container, number, color) {
  container.innerHTML = '';
  number.split('').forEach(n => {
    const div = document.createElement('div');
    div.className = `ball ${color} shadow-lg shadow-black/50`;
    div.textContent = n;
    container.appendChild(div);
  });
}

function generatePrediction() {
  if (isGenerating) return;
  
  isGenerating = true;
  generateBtn.disabled = true;
  generateBtn.textContent = "กำลังคำนวณด้วย AI...";

  const mainColor = currentMode === 'thai'
    ? 'bg-gradient-to-br from-emerald-500 to-teal-700'
    : 'bg-gradient-to-br from-red-500 to-rose-700';

  const loadingHTML = `<div class="ball loading bg-slate-800 border-2 border-slate-600 text-xl">⚡</div>`;
  mainContainer.innerHTML = loadingHTML;
  threeContainer.innerHTML = loadingHTML;
  twoContainer.innerHTML = loadingHTML;
  bottomContainer.innerHTML = loadingHTML;

  setTimeout(() => {
    if (currentMode === 'thai') {
      const lotto6 = generatePositionalNumber('main', 6);
      const lotto3 = lotto6.slice(-3);
      const lotto2 = lotto6.slice(-2);
      const bottom2 = generatePositionalNumber('bottom', 2);

      renderBalls(mainContainer, lotto6, mainColor);
      renderBalls(threeContainer, lotto3, mainColor);
      renderBalls(twoContainer, lotto2, mainColor);
      renderBalls(bottomContainer, bottom2, 'bg-gradient-to-br from-yellow-500 to-orange-600');
      
    } else {
      const lotto4 = generatePositionalNumber('main', 4);
      const lotto3 = lotto4.slice(-3);
      const lotto2 = lotto4.slice(-2);

      renderBalls(mainContainer, lotto4, mainColor);
      renderBalls(threeContainer, lotto3, mainColor);
      renderBalls(twoContainer, lotto2, mainColor);
    }

    isGenerating = false;
    generateBtn.disabled = false;
    generateBtn.innerHTML = "🚀 วิเคราะห์เลขเด่น";

  }, 1200);
}

thaiBtn.onclick = () => {
  if(isGenerating) return;
  currentMode = 'thai';
  thaiBtn.className = 'flex-1 bg-emerald-600 py-3 rounded-xl font-bold transition';
  laoBtn.className = 'flex-1 bg-slate-800 py-3 rounded-xl font-bold transition hover:bg-slate-700';
  thaiBottomSection.style.display = 'block';
  renderHistory();
  
  mainContainer.innerHTML = ''; threeContainer.innerHTML = ''; 
  twoContainer.innerHTML = ''; bottomContainer.innerHTML = '';
};

laoBtn.onclick = () => {
  if(isGenerating) return;
  currentMode = 'lao';
  laoBtn.className = 'flex-1 bg-red-600 py-3 rounded-xl font-bold transition';
  thaiBtn.className = 'flex-1 bg-slate-800 py-3 rounded-xl font-bold transition hover:bg-slate-700';
  thaiBottomSection.style.display = 'none';
  renderHistory();

  mainContainer.innerHTML = ''; threeContainer.innerHTML = ''; 
  twoContainer.innerHTML = ''; bottomContainer.innerHTML = '';
};

// Initialize
renderHistory();
</script>
</body>
</html>
